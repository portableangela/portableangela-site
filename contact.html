<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="wrap nav-row">
    <a href="index.html" class="wordmark">Angela Lang</a>
    <button class="menu-toggle" aria-label="Menu">&#9776;</button>
    <nav class="primary-nav">
      <a href="about.html">About</a>
      <div class="nav-dropdown" tabindex="0">
        <a href="literary.html">Projects</a>
        <div class="nav-dropdown-menu">
          <a href="literary.html">Literary</a>
          <a href="series.html">Visual</a>
          <a href="collaborations.html">Collaborative</a>
        </div>
      </div>
      <a href="contact.html" class="active">Contact</a>
      <a href="https://www.instagram.com/portableangela/" target="_blank" rel="noopener" class="nav-icon" aria-label="Instagram"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.4" cy="6.6" r="1.1" fill="currentColor" stroke="none"/></svg></a>
      <button class="lang-toggle">EN / ES</button>
    </nav>
  </div>
</header>

<main class="wrap">
  <div class="contact-hero">
    <h1 data-contact-heading></h1>
    <p data-contact-sub></p>
  </div>

  <form class="contact-form" data-contact-form method="POST">
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <textarea name="message" rows="3" placeholder="Message" required></textarea>
    <button type="submit">Send message</button>
  </form>

  <div class="newsletter-box">
    <h2 data-newsletter-heading></h2>
    <p data-newsletter-sub></p>
    <form class="newsletter-form" data-newsletter-form method="POST">
      <input type="email" name="email" placeholder="Email address" required>
      <button type="submit">Subscribe</button>
    </form>
  </div>

  <div class="contact-social">
    <a data-social-ig href="#" target="_blank" rel="noopener"></a>
  </div>
</main>


<script src="content.js"></script>
<script src="js/main.js"></script>
<script>renderContact();</script>
</body>
</html>
